<!doctype html>
<html lang="pl">
<head>
  <title>Generator sklepu - HurtDetal Uszefa QUALITET</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1021">
  <meta name="background-color" content="#0b1021">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="U SZEFA">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="store-generator" class="store-generator">
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">
        <div>
          <strong>UszefaQualitet</strong>
          <span>QualitetMarket</span>
          <span class="brand-tag">U SZEFA</span>
        </div>
      </a>
    </div>
  </header>

  <main class="wrap generator-shell">
    <section class="page-hero compact">
      <span class="eyebrow">Kreator sklepu</span>
      <h1>Generator sklepu</h1>
      <p class="lead">Uzupełnij dane, aby stworzyć sklep na platformie U SZEFA.</p>
    </section>

    <form class="panel-card store-form" data-store-generator>
      <div class="form-grid">
        <label class="form-field">
          Nazwa sklepu
          <input type="text" name="storeName" placeholder="np. QualitetMarket Moda" required>
        </label>
        <label class="form-field">
          Slug sklepu
          <input type="text" name="storeSlug" placeholder="np. qualitat-market" required>
          <span class="slug-preview" data-slug-preview>Adres: —</span>
        </label>
      </div>

      <div class="form-grid full">
        <label class="form-field">
          Opis sklepu
          <textarea name="storeDescription" placeholder="Opisz krótko co sprzedajesz i dla kogo"></textarea>
        </label>
      </div>

      <div class="form-grid">
        <label class="form-field">
          Logo URL
          <input type="url" name="storeLogo" placeholder="https://...">
          <span class="field-hint">Podaj link do logo lub zostaw puste.</span>
        </label>
        <div class="form-field">
          Podgląd logo
          <div class="logo-preview" data-logo-preview>
            <span>U</span>
            <img alt="Logo sklepu">
          </div>
        </div>
      </div>

      <div class="form-grid">
        <label class="form-field">
          Email kontaktowy
          <input type="email" name="storeEmail" placeholder="kontakt@twojsklep.pl">
        </label>
        <label class="form-field">
          Telefon
          <input type="tel" name="storePhone" placeholder="+48 000 000 000">
        </label>
      </div>

      <div class="form-grid full">
        <label class="form-field">
          Czas dostawy
          <input type="text" name="storeDelivery" placeholder="np. wysyłka w 24h">
          <span class="field-hint">Informacja pojawi się w podglądzie sklepu.</span>
        </label>
      </div>

      <div class="form-grid full">
        <div class="form-field">
          Kolory sklepu
          <div class="color-grid">
            <label class="form-field">
              Główny
              <input type="color" name="primaryColor" value="#35d9ff">
            </label>
            <label class="form-field">
              Akcent
              <input type="color" name="accentColor" value="#54ffb0">
            </label>
            <label class="form-field">
              Tło
              <input type="color" name="backgroundColor" value="#f5f7fb">
            </label>
          </div>
          <div class="color-preview" aria-hidden="true">
            <span class="color-chip" data-primary-chip></span>
            <span class="color-chip" data-accent-chip></span>
            <span class="color-chip" data-background-chip></span>
          </div>
        </div>
      </div>

      <div class="form-grid">
        <label class="form-field">
          Styl sklepu
          <select name="storeTheme">
            <option value="modern">Modern</option>
            <option value="premium">Premium</option>
            <option value="market">Market</option>
          </select>
        </label>
        <label class="form-field">
          Marża (%)
          <input type="number" name="storeMargin" min="0" max="100" step="1" value="15">
        </label>
      </div>

      <div class="form-grid">
        <label class="form-field">
          Plan
          <select name="storePlan">
            <option value="basic">Basic</option>
            <option value="pro">Pro</option>
            <option value="elite">Elite</option>
          </select>
        </label>
        <label class="form-field">
          Trial
          <select name="storeTrial">
            <option value="true">Tak</option>
            <option value="false">Nie</option>
          </select>
        </label>
      </div>

      <div class="store-actions">
        <button class="btn btn-primary" type="submit">ZAPISZ SKLEP</button>
        <button class="btn btn-secondary" type="button" data-store-preview>PODGLĄD SKLEPU</button>
        <button class="btn btn-secondary" type="button" data-store-panel>OTWÓRZ PANEL</button>
      </div>
    </form>
  </main>

  <script src="stores.js" defer></script>
  <script src="shop.js" defer></script>
  <script src="js/app.js" defer></script>
  <nav class="bottom-nav" aria-label="Dolna nawigacja">
    <a href="index.html" data-nav="start">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5L12 3l9 7.5"></path><path d="M5 10v10h14V10"></path></svg>
      <span class="bottom-nav-label">Start</span>
    </a>
    <a href="sklep.html" data-nav="sklep">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12l-1 13H7L6 7z"></path><path d="M9 7V5a3 3 0 0 1 6 0v2"></path></svg>
      <span class="bottom-nav-label">Sklep</span>
    </a>
    <a href="hurtownie.html" data-nav="hurtownie">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10l9-5 9 5v9H3z"></path><path d="M9 19v-4h6v4"></path></svg>
      <span class="bottom-nav-label">Hurtownie</span>
    </a>
    <a href="dashboard.html" data-nav="panel">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4z"></path><path d="M13 4h7v4h-7z"></path><path d="M13 10h7v10h-7z"></path><path d="M4 13h7v7H4z"></path></svg>
      <span class="bottom-nav-label">Panel</span>
    </a>
    <a href="login.html" data-nav="konto">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"></path></svg>
      <span class="bottom-nav-label">Konto</span>
    </a>
  </nav>
</body>
</html>
