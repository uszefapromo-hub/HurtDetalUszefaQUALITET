<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sklep</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {background:#0b0f1f;color:white;font-family:Arial;margin:0}
.grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px}
.card {background:#151a30;padding:15px;border-radius:10px}
img {width:100%;height:150px;object-fit:contain;background:white}
button {width:100%;padding:10px;margin-top:10px;background:#7c3aed;color:white;border:none;cursor:pointer}
</style>
</head>

<body>

<h1 style="padding:20px">Sklep</h1>

<div id="products" class="grid"></div>

<script>
const FALLBACK_PRODUCTS = [
  {id:1,title:"iPhone 13",price:3999,image:"https://via.placeholder.com/200"},
  {id:2,title:"Laptop Dell",price:2899,image:"https://via.placeholder.com/200"},
  {id:3,title:"Buty Nike",price:299,image:"https://via.placeholder.com/200"},
  {id:4,title:"Telewizor Samsung",price:1999,image:"https://via.placeholder.com/200"},
  {id:5,title:"Słuchawki Sony",price:499,image:"https://via.placeholder.com/200"}
];

function render(products){
  const c = document.getElementById('products');
  c.innerHTML = '';

  products.forEach(p=>{
    const el = document.createElement('div');
    el.className='card';

    el.innerHTML = `
      <img src="${p.image}">
      <h3>${p.title}</h3>
      <p>${p.price} zł</p>
      <button onclick="add(${p.id})">Dodaj do koszyka</button>
    `;

    c.appendChild(el);
  });
}

function add(id){
  let cart = JSON.parse(localStorage.getItem('cart')||'[]');
  cart.push(id);
  localStorage.setItem('cart',JSON.stringify(cart));
  alert('Dodano');
}

async function load(){
  try{
    const res = await fetch('https://api.uszefaqualitet.pl/api/products');
    const data = await res.json();

    if(!data || !data.length) throw "empty";

    render(data);
  }catch(e){
    console.log("API padło → używam fallback");
    render(FALLBACK_PRODUCTS);
  }
}

load();
</script>

</body>
</html>
