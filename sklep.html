<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QualitetMarket - Sklep</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #060b1f;
      color: #fff;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(180deg, #0b1433 0%, #09112b 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    .logo span {
      color: #7c3aed;
    }

    .search {
      flex: 1;
      min-width: 240px;
    }

    .search input {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #111933;
      color: #fff;
      padding: 0 14px;
      outline: none;
      font-size: 15px;
    }

    .cart-btn {
      height: 46px;
      border: 0;
      padding: 0 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #22d3ee);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 38px;
    }

    .sub {
      margin: 0 0 22px;
      color: #9fb0da;
      font-size: 15px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      border: 1px solid rgba(255,255,255,0.1);
      background: #111933;
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #7c3aed;
      border-color: #7c3aed;
    }

    .status {
      color: #9fb0da;
      font-size: 14px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      background: #101933;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
    }

    .img-wrap {
      background: #fff;
      padding: 16px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      padding: 16px;
    }

    .cat {
      color: #8ea2d8;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .title {
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
      min-height: 44px;
      margin-bottom: 10px;
    }

    .price {
      color: #22d3ee;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .buy-btn {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #8b5cf6);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .empty {
      grid-column: 1 / -1;
      background: #101933;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 40px;
      text-align: center;
      color: #9fb0da;
    }

    @media (max-width: 700px) {
      h1 { font-size: 30px; }
      .wrap { padding: 18px 14px 30px; }
      .header-inner { padding: 12px 14px; }
      .products { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><span>Q</span>ualitetMarket</div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Szukaj produktu...">
    </div>
    <button class="cart-btn" onclick="openCart()">
      Koszyk (<span id="cartCount">0</span>)
    </button>
  </div>
</header>

<div class="wrap">
  <h1>Sklep</h1>
  <p class="sub">Gotowa wersja działająca od razu. Produkty pokazują się bez czekania.</p>

  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-category="all">Wszystkie</button>
      <button class="filter-btn" data-category="Elektronika">Elektronika</button>
      <button class="filter-btn" data-category="Moda">Moda</button>
      <button class="filter-btn" data-category="TV">RTV</button>
      <button class="filter-btn" data-category="Audio">Audio</button>
    </div>
    <div class="status" id="status">Załadowano produkty.</div>
  </div>

  <div class="products" id="products"></div>
</div>

<script>
  function svgPlaceholder(label, bg, fg) {
    return 'data:image/svg+xml;utf8,' + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="500" height="500">
        <rect width="100%" height="100%" rx="24" fill="${bg}"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
          font-family="Arial" font-size="34" font-weight="700" fill="${fg}">
          ${label}
        </text>
      </svg>
    `);
  }

  const productsData = [
    {
      id: 1,
      title: "iPhone 13",
      price: 3999,
      category: "Elektronika",
      image: svgPlaceholder("iPhone 13", "#f3f4f6", "#111827")
    },
    {
      id: 2,
      title: "Laptop Dell",
      price: 2899,
      category: "Elektronika",
      image: svgPlaceholder("Laptop Dell", "#e5e7eb", "#111827")
    },
    {
      id: 3,
      title: "Buty Nike",
      price: 299,
      category: "Moda",
      image: svgPlaceholder("Buty Nike", "#fef3c7", "#111827")
    },
    {
      id: 4,
      title: "Telewizor Samsung",
      price: 1999,
      category: "TV",
      image: svgPlaceholder("Telewizor", "#dbeafe", "#111827")
    },
    {
      id: 5,
      title: "Słuchawki Sony",
      price: 499,
      category: "Audio",
      image: svgPlaceholder("Słuchawki", "#ede9fe", "#111827")
    },
    {
      id: 6,
      title: "Bluza Adidas",
      price: 249,
      category: "Moda",
      image: svgPlaceholder("Bluza Adidas", "#dcfce7", "#111827")
    },
    {
      id: 7,
      title: "Monitor LG 27",
      price: 1199,
      category: "Elektronika",
      image: svgPlaceholder("Monitor LG", "#e0f2fe", "#111827")
    },
    {
      id: 8,
      title: "Głośnik JBL",
      price: 349,
      category: "Audio",
      image: svgPlaceholder("Głośnik JBL", "#fee2e2", "#111827")
    }
  ];

  let currentCategory = 'all';

  function getCart() {
    try {
      return JSON.parse(localStorage.getItem('qm_cart') || '[]');
    } catch (e) {
      return [];
    }
  }

  function saveCart(cart) {
    localStorage.setItem('qm_cart', JSON.stringify(cart));
  }

  function updateCartCount() {
    const cart = getCart();
    const total = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
    document.getElementById('cartCount').textContent = total;
  }

  function addToCart(product) {
    const cart = getCart();
    const existing = cart.find(item => String(item.id) === String(product.id));

    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({
        id: product.id,
        title: product.title,
        price: product.price,
        image: product.image,
        qty: 1
      });
    }

    saveCart(cart);
    updateCartCount();
    alert('Dodano do koszyka');
  }

  function openCart() {
    window.location.href = 'koszyk.html';
  }

  function formatPrice(price) {
    return Number(price).toLocaleString('pl-PL') + ' zł';
  }

  function renderProducts() {
    const container = document.getElementById('products');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    let items = [...productsData];

    if (currentCategory !== 'all') {
      items = items.filter(p => p.category === currentCategory);
    }

    if (search) {
      items = items.filter(p => p.title.toLowerCase().includes(search));
    }

    if (!items.length) {
      container.innerHTML = '<div class="empty">Brak produktów</div>';
      return;
    }

    container.innerHTML = '';

    items.forEach(product => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="img-wrap">
          <img src="${product.image}" alt="${product.title}">
        </div>
        <div class="card-body">
          <div class="cat">${product.category}</div>
          <div class="title">${product.title}</div>
          <div class="price">${formatPrice(product.price)}</div>
          <button class="buy-btn">Dodaj do koszyka</button>
        </div>
      `;

      card.querySelector('.buy-btn').addEventListener('click', function () {
        addToCart(product);
      });

      container.appendChild(card);
    });
  }

  document.getElementById('searchInput').addEventListener('input', renderProducts);

  document.querySelectorAll('#filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('#filters .filter-btn').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.dataset.category;
      renderProducts();
    });
  });

  updateCartCount();
  renderProducts();
</script>

</body>
</html>
