<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sklep - QualitetMarket</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#08112b;color:#fff}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}
    .btn{border:none;border-radius:12px;padding:10px 14px;background:#6d5dfc;color:#fff;cursor:pointer;text-decoration:none;display:inline-block}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{background:#111c44;border-radius:16px;overflow:hidden;padding:14px;display:flex;flex-direction:column}
    .card img{width:100%;height:220px;object-fit:cover;border-radius:12px;background:#fff}
    .title{font-size:18px;font-weight:700;margin:10px 0 6px}
    .desc{color:#b8c3ea;font-size:14px;min-height:38px}
    .price{font-size:22px;font-weight:800;margin:12px 0}
    .actions{display:flex;gap:8px;margin-top:auto}
    .actions a,.actions button{flex:1;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Sklep</h1>
      <a class="btn" href="index.html">← Wróć</a>
    </div>
    <div id="products" class="grid"></div>
  </div>

  <script>
    const API_URL = 'https://dummyjson.com/products?limit=24';
    const FALLBACK = [
      {id:1001,title:'Smartwatch Active X',description:'Lekki zegarek do codziennego użycia.',price:699,thumbnail:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=900&q=80'},
      {id:1002,title:'Słuchawki ANC Pro',description:'Bezprzewodowe słuchawki z redukcją szumów.',price:449,thumbnail:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=900&q=80'},
      {id:1003,title:'Beauty Set Glow',description:'Zestaw beauty z dobrym AOV.',price:189,thumbnail:'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=900&q=80'},
      {id:1004,title:'Plecak City Travel',description:'Mocny produkt lifestyle.',price:259,thumbnail:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80'}
    ];

    async function loadProducts(){
      try{
        const res = await fetch(API_URL,{cache:'no-store'});
        const data = await res.json();
        const products = Array.isArray(data.products) ? data.products : FALLBACK;
        render(products);
      }catch(e){
        render(FALLBACK);
      }
    }

    function render(products){
      const box = document.getElementById('products');
      box.innerHTML = products.map(p => `
        <div class="card">
          <a href="product.html?id=${p.id}">
            <img src="${p.thumbnail}" alt="${p.title}">
          </a>
          <div class="title">${p.title}</div>
          <div class="desc">${(p.description || '').slice(0,80)}</div>
          <div class="price">${p.price} zł</div>
          <div class="actions">
            <a class="btn" href="product.html?id=${p.id}">Zobacz produkt</a>
            <button class="btn" onclick="addToCart(${p.id}, ${JSON.stringify(p.title)})">Dodaj</button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id,title){
      const cart = JSON.parse(localStorage.getItem('qm_cart') || '[]');
      const item = cart.find(x => x.id === id);
      if(item) item.qty += 1;
      else cart.push({id:id,title:title,qty:1});
      localStorage.setItem('qm_cart', JSON.stringify(cart));
      alert('Dodano do koszyka');
    }

    loadProducts();
  </script>
</body>
</html>
