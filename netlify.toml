[build]
  publish = "."
  command = ""

# ── Canonical domain: non-www → www ──────────────────────────────────────────
[[redirects]]
  from = "https://qualitet-market.com/*"
  to   = "https://www.qualitet-market.com/:splat"
  status = 301
  force  = true

# ── Home ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# ── Shop / koszyk / checkout clean URLs ──────────────────────────────────────
