[build]
  publish = "."
  command = ""

# ── Canonical domain: redirect non-www to www ────────────────────────────────
[[redirects]]
  from = "https://qualitet-market.com/*"
  to   = "https://www.qualitet-market.com/:splat"
  status = 301
  force  = true

# ── Root ─────────────────────────────────────────────────────────────────────
[[redirects]]
  from = "/"
  to   = "/index.html"
  status = 200

# ── Shop / Koszyk / Checkout (clean URLs with sub-paths) ─────────────────────
[[redirects]]
  from = "/sklep"
  to   = "/sklep.html"
  status = 301

[[redirects]]
  from = "/sklep/*"
  to   = "/sklep.html"
  status = 200

[[redirects]]
