[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/sklep"
  to = "/sklep.html"
  status = 301

[[redirects]]
  from = "/sklep/*"
  to = "/sklep.html"
  status = 200

[[redirects]]
  from = "/koszyk"
  to = "/koszyk.html"
  status = 301

[[redirects]]
  from = "/koszyk/*"
  to = "/koszyk.html"
  status = 200

[[redirects]]
  from = "/checkout"
  to = "/koszyk.html"
  status = 301

[[redirects]]
  from = "/checkout/*"
  to = "/koszyk.html"
  status = 200

[[redirects]]
  from = "/shop"
  to = "/sklep.html"
  status = 301

[[redirects]]
  from = "/shop/*"
  to = "/sklep.html"
  status = 200

[[redirects]]
  from = "/api/ai/chat"
  to = "/.netlify/functions/ai-chat"
  status = 200

[[redirects]]
  from = "/api/seller/supplier"
  to = "/.netlify/functions/seller-supplier"
  status = 200

[[redirects]]
  from = "/api/seller/import-products"
  to = "/.netlify/functions/seller-import-products"
  status = 200

[[redirects]]
  from = "/api/seller/products"
  to = "/.netlify/functions/seller-products"
  status = 200

[[redirects]]
  from = "/api/stripe/create-session"
  to = "/.netlify/functions/stripe-create-session"
  status = 200

[[redirects]]
  from = "/ai"
  to = "/ai.html"
  status = 200

[[redirects]]
  from = "/launch/*"
  to = "/launch.html"
  status = 200

[[redirects]]
  from = "/launch"
  to = "/launch.html"
  status = 200

[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 301

[[redirects]]
  from = "/success/*"
  to = "/success.html"
  status = 200

# SPA fallback: route all unmatched paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "frame-ancestors 'self'; frame-src 'self' https://www.youtube.com https://www.tiktok.com https://js.stripe.com https://hooks.stripe.com; object-src 'none'"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
