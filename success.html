<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Płatność zakończona — QualitetMarket</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/qualitetverse.css">
  <style>
    .success-shell{max-width:840px;margin:0 auto;padding:40px 20px 80px}
    .success-card{border:1px solid var(--stroke);background:var(--card);border-radius:24px;padding:34px;box-shadow:var(--shadow);text-align:center}
    .success-icon{font-size:68px;line-height:1;margin-bottom:14px}
    .success-title{font-size:clamp(26px,4vw,38px);margin:0 0 10px}
    .success-text{color:var(--muted);margin:0 auto 20px;max-width:540px}
    .success-session{font-size:13px;color:var(--muted);margin:0 0 24px;word-break:break-all}
    .success-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body data-page="success">
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">
        <div>
          <strong>QualitetMarket</strong>
          <span>Platforma dropshipping</span>
        </div>
      </a>
      <nav class="nav" aria-label="Główna nawigacja">
        <a href="sklep.html">Sklep</a>
        <a href="hurtownie.html">Hurtownie</a>
        <a href="zarabiaj.html">Sprzedawaj</a>
        <a href="cennik.html">Cennik</a>
      </nav>
      <a class="btn btn-primary topbar-cta" href="koszyk.html">🛒 Koszyk</a>
    </div>
  </header>

  <main class="success-shell">
    <section class="success-card">
      <div class="success-icon">✅</div>
      <div class="eyebrow">Płatność zakończona</div>
      <h1 class="success-title">Dziękujemy za zakup</h1>
      <p class="success-text">Płatność została przyjęta. Zamówienie trafiło do realizacji i potwierdzenie zostanie wysłane na adres e-mail.</p>
      <p class="success-session" data-session-id hidden></p>
      <div class="success-actions">
        <a class="btn btn-primary" href="sklep.html">Kontynuuj zakupy</a>
        <a class="btn btn-secondary" href="index.html">Strona główna</a>
      </div>
    </section>
  </main>

  <script>
    (function(){
      try { localStorage.removeItem('qm_cart'); } catch (_) {}

      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');
      var sessionTarget = document.querySelector('[data-session-id]');
      if (sessionId && sessionTarget) {
        sessionTarget.hidden = false;
        sessionTarget.textContent = 'ID sesji Stripe: ' + sessionId;
      }
    })();
  </script>
</body>
</html>
