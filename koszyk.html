<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <title>Koszyk | QualitetMarket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Inter, sans-serif;
      background:#0b0b0f;
      color:#fff;
      margin:0;
      padding:20px;
    }
    .container{
      max-width:800px;
      margin:0 auto;
    }
    h1{
      margin-bottom:20px;
    }
    .cart-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px;
      border:1px solid #222;
      border-radius:10px;
      margin-bottom:10px;
    }
    .cart-item span{
      font-size:14px;
    }
    button{
      background:#7c3aed;
      color:#fff;
      border:none;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
    }
    .danger{
      background:#ef4444;
    }
    .total{
      margin-top:20px;
      font-size:18px;
      font-weight:700;
    }
    .actions{
      margin-top:20px;
      display:flex;
      gap:10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Twój koszyk</h1>

  <div id="cart-items"></div>

  <div class="total">
    Razem: <span id="cart-total">0 zł</span>
  </div>

  <div class="actions">
    <button onclick="clearCart()" class="danger">Wyczyść</button>
    <button onclick="goCheckout()">Przejdź do płatności</button>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

function renderCart(){
  const container = document.getElementById("cart-items");
  const totalEl = document.getElementById("cart-total");

  container.innerHTML = "";

  if(cart.length === 0){
    container.innerHTML = "<p>Koszyk jest pusty</p>";
    totalEl.innerText = "0 zł";
    return;
  }

  let total = 0;

  cart.forEach(item=>{
    total += item.price * item.qty;

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <span>${item.name} (x${item.qty})</span>
      <div>
        <button onclick="decreaseQty('${item.id}')">-</button>
        <button onclick="increaseQty('${item.id}')">+</button>
        <button onclick="removeItem('${item.id}')" class="danger">Usuń</button>
      </div>
    `;
    container.appendChild(div);
  });

  totalEl.innerText = total.toFixed(2) + " zł";
}

function increaseQty(id){
  const item = cart.find(p=>p.id===id);
  if(item) item.qty++;
  save();
}

function decreaseQty(id){
  const item = cart.find(p=>p.id===id);
  if(item && item.qty > 1) item.qty--;
  save();
}

function removeItem(id){
  cart = cart.filter(p=>p.id!==id);
  save();
}

function clearCart(){
  cart = [];
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function goCheckout(){
  window.location.href = "checkout.html";
}

renderCart();
</script>

</body>
</html>
